name: Java CI

on:
  pull_request:
    branches:
      - '*'
    paths:
      - '**.java'
      - 'pom.xml'
  push:
    branches:
      - '*'
    paths:
      - '**.java'
      - 'pom.xml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B -ntp clean verify