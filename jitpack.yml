jdk:
  - openjdk21
before_install:
  - sdk install java 25.0.1-tem
  - sdk default java 25.0.1-tem
  - sdk install maven 3.9.11
  - sdk default maven 3.9.11
install:
  - bash -c 'source "$HOME/.sdkman/bin/sdkman-init.sh" && export JAVA_HOME="$HOME/.sdkman/candidates/java/current" && mvn -B clean install -DskipTests'
